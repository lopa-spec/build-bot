name: Build APK from ZIP

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file Flutter project'
        required: true
        type: string
      tag:
        description: 'Release tag'
        required: true
        type: string
      build_type:
        description: 'Build type (debug/release)'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download ZIP
        run: |
          wget -O project.zip "${{ github.event.inputs.zip_url }}"
          unzip project.zip -d ./project

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Install Dependencies
        working-directory: ./project
        run: flutter pub get

      - name: Build APK
        working-directory: ./project
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.build_type }}
          path: ./project/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
